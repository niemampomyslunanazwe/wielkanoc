<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wielkanoc</title>
    <style>
        body {
            background-color: #FFFFE0;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #FF6600;
            font-size: 48px;
        }
        h2 {
            color: #8B0000;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }
        .item {
            background-color: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: 200px;
        }
        .item img {
            width: 150px;
            height: 150px;
            object-fit: contain;
        }
        .item p {
            font-weight: bold;
            color: #FF6600;
            margin-top: 10px;
        }
        footer {
            margin-top: 40px;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Dzień dobry!</h1>
    <h2>Wesołych Świąt Wielkanocnych</h2>

    <div class="gallery">
        <div class="item">
            <img src="jajko.png" alt="Jajko wielkanocne">
            <p>Jajko wielkanocne</p>
        </div>
        <div class="item">
            <img src="zajac.png" alt="Zajączek wielkanocny">
            <p>Zajączek</p>
        </div>
        <div class="item">
            <img src="kwiaty.png" alt="Kwiaty wiosenne">
            <p>Kwiaty</p>
        </div>
        <div class="item">
            <img src="koszyczek.png" alt="Koszyczek wielkanocny">
            <p>Koszyczek</p>
        </div>
        <div class="item">
            <img src="baranek.png" alt="Baranek wielkanocny">
            <p>Baranek</p>
        </div>
    </div>

</body>
</html>
